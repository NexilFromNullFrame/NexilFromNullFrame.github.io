<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexil | Start</title>
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="manifest" href="/site.webmanifest">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@200;300;400&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            background-color: #000;
            color: #fff;
            font-family: "Source Sans 3", sans-serif;
            padding: 40px;
        }

        h1 {
            font-weight: 200;
            font-size: 3rem;
            margin-bottom: 2rem;
            letter-spacing: -1px;
        }

        /* Metro Grid Layout */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 10px;
            max-width: 800px;
        }

        .tile {
            aspect-ratio: 1 / 1;
            background-color: #0078d7; /* Classic Windows Blue */
            padding: 15px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            transition: transform 0.1s;
            text-decoration: none;
            color: white;
        }

        .tile:hover {
            outline: 3px solid #ccc;
            transform: scale(0.98);
        }

        .tile.github { background-color: #333; }
        .tile.wide { grid-column: span 2; aspect-ratio: 2 / 1; }

        .tile-label {
            font-weight: 300;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <h1>Start</h1>

    <div class="grid">
        <a href="https://github.com/NexilFromNullFrame" class="tile wide github">
            <span class="tile-label">GitHub Profile</span>
        </a>
        <div class="tile">
            <span class="tile-label">Projects</span>
        </div>
        <div class="tile" style="background-color: #a40000;">
            <span class="tile-label">About</span>
        </div>
    </div>

</body>
</html>
