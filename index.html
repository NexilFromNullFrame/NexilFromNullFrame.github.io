<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexil | Start</title>
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="manifest" href="/site.webmanifest">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@200;300;400&display=swap" rel="stylesheet">

    <style>
        :root {
            --win-blue: #0078d7;
            --win-red: #a40000;
            --win-bg: #1d1d1d; /* Windows 8.1 Charcoal */
        }

        body {
            margin: 0;
            background-color: var(--win-bg);
            color: #fff;
            /* Font stack prioritizes system Segoe UI Light if available */
            font-family: "Segoe UI Light", "Segoe UI", "Source Sans 3", sans-serif;
            padding: 80px 0 0 80px;
            overflow-y: hidden; /* Win 8 scrolls horizontally */
            overflow-x: auto;
        }

        h1 {
            font-weight: 300;
            font-size: 4.5rem;
            margin: 0 0 40px 0;
            letter-spacing: -1px;
            text-transform: lowercase;
        }

        /* The Horizontal Metro Grid */
        .grid {
            display: grid;
            grid-template-rows: repeat(2, 155px); /* Two rows of tiles */
            grid-auto-flow: column;
            grid-auto-columns: 155px;
            gap: 12px;
            height: 330px;
        }

        /* Base Tile Style */
        .tile {
            position: relative;
            width: 155px;
            height: 155px;
            background-color: var(--win-blue);
            text-decoration: none;
            color: white;
            overflow: hidden;
            transition: outline 0.1s;
            cursor: pointer;
        }

        .tile:hover {
            outline: 3px solid rgba(255, 255, 255, 0.4);
        }

        .tile:active {
            transform: scale(0.97); /* The 'pressed' look */
        }

        .tile.wide {
            width: 322px; /* (155 * 2) + 12px gap */
            grid-column: span 2;
        }

        .tile-label {
            position: absolute;
            bottom: 10px;
            left: 12px;
            font-weight: 400;
            font-size: 0.85rem;
            text-transform: lowercase;
            z-index: 10;
        }

        /* Live Tile Animation (Vertical Flip/Slide) */
        .live-wrapper {
            display: flex;
            flex-direction: column;
            height: 200%;
            transition: transform 0.6s cubic-bezier(0.85, 0, 0.15, 1);
            animation: flipTile 8s infinite;
        }

        .live-face {
            height: 155px;
            padding: 15px;
            box-sizing: border-box;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            font-weight: 300;
        }

        @keyframes flipTile {
            0%, 45% { transform: translateY(0); }
            50%, 95% { transform: translateY(-50%); }
            100% { transform: translateY(0); }
        }

        /* Specific Tile Colors */
        .github { background-color: #2b2b2b; }
        .projects { background-color: #008a00; }
        .about { background-color: var(--win-red); }

    </style>
</head>
<body>

    <h1>start</h1>

    <div class="grid">
        <a href="https://github.com/NexilFromNullFrame" class="tile wide github">
            <div class="live-wrapper">
                <div class="live-face">github profile</div>
                <div class="live-face" style="font-size: 0.9rem;">check my latest commits →</div>
            </div>
            <span class="tile-label">github</span>
        </a>

        <div class="tile projects">
            <span class="tile-label">projects</span>
        </div>

        <div class="tile about" style="grid-row: 2;">
            <span class="tile-label">about</span>
        </div>

        <div class="tile" style="background-color: #7e3878;">
            <span class="tile-label">settings</span>
        </div>
    </div>

</body>
</html>
